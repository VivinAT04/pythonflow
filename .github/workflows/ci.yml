name: PythonFlow CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=. pytest

      - name: Run simple DAG
        run: |
          python -m examples.simple_dag

      - name: Run parallel DAG
        run: |
          python -m examples.parallel_dag

      - name: Import dashboard app
        run: |
          python -c "from pythonflow.dashboard import app; print('Dashboard import OK')"

      - name: Build Docker image
        run: |
          docker build -t pythonflow .
